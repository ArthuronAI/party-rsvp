<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Party RSVP</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 2rem;
      line-height: 1.5;
      color: #222;
    }

    .container {
      max-width: 520px;
    }

    .row {
      margin: 0.5rem 0;
    }

    .buttons {
      margin-top: 1.25rem;
      display: flex;
      gap: 0.75rem;
    }

    button {
      padding: 0.6rem 1rem;
      border: 1px solid #ccc;
      background: #f6f6f6;
      cursor: pointer;
      font-size: 1rem;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.6;
    }

    #status {
      margin-top: 1rem;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>You're Invited!</h1>

    <p class="row"><strong>Child Name:</strong> <span id="childName">Loading...</span></p>
    <p class="row"><strong>Date:</strong> <span id="date">Loading...</span></p>
    <p class="row"><strong>Time:</strong> <span id="time">Loading...</span></p>
    <p class="row"><strong>Location:</strong> <span id="location">Loading...</span></p>

    <div class="buttons">
      <button id="yesBtn" type="button">YES</button>
      <button id="noBtn" type="button">NO</button>
    </div>

    <p id="status"></p>
  </main>

  <script>
    const statusEl = document.getElementById('status');
    const yesBtn = document.getElementById('yesBtn');
    const noBtn = document.getElementById('noBtn');

    function getInviteIdFromPath() {
      const parts = window.location.pathname.split('/').filter(Boolean);
      return parts.length > 1 ? decodeURIComponent(parts[parts.length - 1]) : '';
    }

    const inviteId = getInviteIdFromPath();

    function setButtonsDisabled(disabled) {
      yesBtn.disabled = disabled;
      noBtn.disabled = disabled;
    }

    async function loadInvite() {
      if (!inviteId) {
        statusEl.textContent = 'Invalid invite link.';
        setButtonsDisabled(true);
        return;
      }

      try {
        const res = await fetch(`/api/invite/${encodeURIComponent(inviteId)}`, {
          headers: {
            'Accept': 'application/json',
          },
        });

        if (!res.ok) {
          throw new Error(`Request failed with status ${res.status}`);
        }

        const invite = await res.json();
        document.getElementById('childName').textContent = invite.childName || '';
        document.getElementById('date').textContent = invite.date || '';
        document.getElementById('time').textContent = invite.time || '';
        document.getElementById('location').textContent = invite.location || '';
      } catch (error) {
        statusEl.textContent = `Failed to load invite: ${error.message}`;
        setButtonsDisabled(true);
      }
    }

    async function sendRsvp(response) {
      setButtonsDisabled(true);
      statusEl.textContent = 'Submitting response...';

      try {
        const res = await fetch('/api/rsvp', {
          method: 'POST',
          headers: {
            'Accept': 'application/json',
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            inviteId,
            response,
          }),
        });

        if (!res.ok) {
          throw new Error(`Request failed with status ${res.status}`);
        }

        alert('Thanks for your response!');
        statusEl.textContent = 'Response submitted.';
      } catch (error) {
        statusEl.textContent = `Failed to submit RSVP: ${error.message}`;
        setButtonsDisabled(false);
      }
    }

    yesBtn.addEventListener('click', () => sendRsvp('yes'));
    noBtn.addEventListener('click', () => sendRsvp('no'));

    loadInvite();
  </script>
</body>
</html>
